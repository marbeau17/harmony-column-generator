<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ページが見つかりません | Harmony スピリチュアルコラム</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    :root {
      --color-primary: #b39578;
      --color-dark: #53352b;
      --color-gold: #d4a574;
      --color-bg: #faf3ed;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--color-bg);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--color-dark);
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .error-code {
      font-size: 8rem;
      font-weight: 700;
      color: var(--color-gold);
      line-height: 1;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1rem;
      color: #6b5b50;
      margin-bottom: 2rem;
    }

    .btn-back {
      display: inline-block;
      background-color: var(--color-dark);
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }

    .btn-back:hover {
      opacity: 0.85;
    }

    .link-home {
      display: block;
      margin-top: 1.25rem;
      color: var(--color-primary);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .link-home:hover {
      text-decoration: underline;
    }

    footer {
      position: absolute;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #a0917e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>ページが見つかりません</h1>
    <p>お探しのページは移動または削除された可能性があります。</p>
    <a href="/column/" class="btn-back">コラム一覧へ戻る</a>
    <a href="https://harmony-mc.com/" class="link-home">ホームへ</a>
  </div>
  <footer>&copy; 2026 Harmony スピリチュアルコラム</footer>
</body>
</html>
