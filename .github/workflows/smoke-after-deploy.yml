# ============================================================================
# .github/workflows/smoke-after-deploy.yml
# P5-32 Layer 5: 本番デプロイ後に Playwright で smoke テストを実行する。
# main へ push 後 ~2 分待機して Vercel デプロイ完了を待ち、
# https://blogauto-pi.vercel.app に対して smoke 実行。
# ============================================================================
name: Smoke After Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # 手動トリガーも可能

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel deployment (2 minutes)
        run: sleep 120

      - name: Run smoke tests against production
        env:
          TEST_BASE_URL: https://blogauto-pi.vercel.app
        run: npx playwright test test/e2e/smoke-prod.spec.ts --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
