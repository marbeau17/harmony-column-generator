# ============================================================================
# .github/workflows/article-health-daily.yml
# P5-61: Article Health Monitor вҖ” жҜҺж—Ҙ JST 7:00 (UTC 22:00) гҒ« 12 й …зӣ®гғҒгӮ§гғғгӮҜ
# иЁӯиЁҲеҸӮз…§: docs/refactor/article-health-monitor.md
# ============================================================================
name: Article Health Daily

on:
  schedule:
    - cron: '0 22 * * *' # JST 7:00
  workflow_dispatch: # жүӢеӢ•гғҲгғӘгӮ¬гғјгӮӮеҸҜиғҪ

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # P5-61: secrets гҒҜз’°еўғ "NEXT_PUBLIC_SITE_URL" гҒ«йӣҶзҙ„жёҲгҒҝ
    #   - NEXT_PUBLIC_SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY (еҝ…й Ҳ)
    #   - NEXT_PUBLIC_SITE_URL / NEXT_PUBLIC_HUB_PATH / NEXT_PUBLIC_APP_URL (д»»ж„Ҹ)
    environment: NEXT_PUBLIC_SITE_URL
    permissions:
      contents: read
      issues: write # critical fail жҷӮгҒ« Issue иө·зҘЁ
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify secrets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL secret гҒҢиЁӯе®ҡгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY secret гҒҢиЁӯе®ҡгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“"
            exit 1
          fi
          echo "secrets OK: SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:0:30}..."

      - name: Run health checks
        id: health
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://harmony-mc.com' }}
          NEXT_PUBLIC_HUB_PATH: ${{ secrets.NEXT_PUBLIC_HUB_PATH || '/spiritual/column' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://blogauto-pi.vercel.app' }}
        run: |
          set -o pipefail
          mkdir -p out/health
          npx tsx scripts/health/run-all.ts \
            --json out/health/health-$(date -u +%Y%m%d).json \
            2>&1 | tee out/health/console-$(date -u +%Y%m%d).log
          # tsx exits non-zero on script error вҶ’ pipefail гҒ§ propagate

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: article-health-report
          path: out/health/
          retention-days: 30

      - name: Detect critical failures
        id: critical
        if: always()
        run: |
          LATEST_JSON=$(ls -t out/health/health-*.json | head -1)
          if [ -z "$LATEST_JSON" ]; then
            echo "no_json=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CRITICAL=$(jq '.criticalFailed' "$LATEST_JSON")
          HIGH=$(jq '.highFailed' "$LATEST_JSON")
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "json_path=$LATEST_JSON" >> $GITHUB_OUTPUT

      - name: Create issue on critical failure
        if: steps.critical.outputs.critical != '0' && steps.critical.outputs.critical != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const jsonPath = '${{ steps.critical.outputs.json_path }}';
            const summary = JSON.parse(fs.readFileSync(jsonPath, 'utf-8'));
            const failed = summary.results.filter(r => !r.ok && r.severity === 'critical');
            const body = [
              `# рҹҡЁ Article Health: critical з•°еёёжӨңзҹҘ`,
              ``,
              `жӨңжҹ»жҷӮеҲ»: ${summary.timestamp}`,
              `еҜҫиұЎиЁҳдәӢ: ${summary.totalArticles} д»¶`,
              `Critical еӨұж•—: ${summary.criticalFailed}`,
              ``,
              `## еӨұж•—й …зӣ®`,
              ...failed.map(r => `- **${r.id}** ${r.label}: ${r.detail}`),
              ``,
              `## гӮөгғігғ—гғ«`,
              ...failed.flatMap(r =>
                (r.failedSamples ?? []).slice(0, 3).map(s => `- ${r.id}: ${s.slug ?? s.id} вҖ” ${s.note}`)
              ),
              ``,
              `[full JSON report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Health] critical=${summary.criticalFailed} on ${summary.timestamp.slice(0, 10)}`,
              body,
              labels: ['health-monitor', 'critical'],
            });

      - name: Fail job on critical
        if: steps.critical.outputs.critical != '0' && steps.critical.outputs.critical != ''
        run: |
          echo "::error::critical failures detected: ${{ steps.critical.outputs.critical }}"
          exit 1
