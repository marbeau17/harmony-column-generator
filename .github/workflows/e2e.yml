name: E2E (Publish Control V2)

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'supabase/migrations/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-control-e2e:
    name: monkey + hub-rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # shadow Supabase（CI 内で起動する local supabase の demo keys、公開済み定数）
      MONKEY_SUPABASE_URL: http://127.0.0.1:54321
      MONKEY_SUPABASE_SERVICE_ROLE: ${{ secrets.MONKEY_SUPABASE_SERVICE_ROLE_KEY }}
      MONKEY_BASE_URL: http://localhost:3100
      TEST_BASE_URL: http://localhost:3100
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      TEST_USER_EMAIL: marbeau17@gmail.com
      MONKEY_TEST: 'true'
      FTP_DRY_RUN: 'true'
      PUBLISH_CONTROL_V2: 'on'
      PUBLISH_CONTROL_FTP: 'on'
      FTP_REMOTE_PATH: /spiritual/column/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start Supabase shadow
        run: npx supabase start

      - name: Apply migrations + seed test user
        run: |
          npx supabase db reset --local
          curl -sf -X POST "$MONKEY_SUPABASE_URL/auth/v1/admin/users" \
            -H "apikey: $MONKEY_SUPABASE_SERVICE_ROLE" \
            -H "Authorization: Bearer $MONKEY_SUPABASE_SERVICE_ROLE" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$TEST_USER_EMAIL\",\"password\":\"$TEST_USER_PASSWORD\",\"email_confirm\":true}"

      - name: Build app
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.MONKEY_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MONKEY_SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run build

      - name: Start dev server (port 3100)
        env:
          PORT: '3100'
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.MONKEY_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MONKEY_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npx next dev -p 3100 > /tmp/next-e2e.log 2>&1 &
          echo "PID=$!"
          until curl -sf -o /dev/null http://localhost:3100/login; do sleep 2; done
          echo "Dev server ready"

      - name: Run Playwright (monkey + hub-rebuild)
        run: npx playwright test monkey-publish-control hub-rebuild --reporter=list

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            /tmp/next-e2e.log
          retention-days: 7

      - name: Stop Supabase shadow
        if: always()
        run: npx supabase stop || true
